<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const A="#e8530a",G="#2d7a1f",BG="#1a1a1a",C="#242424",C2="#2e2e2e",BR="#333",MU="#666",SO="#999",TX="#f0f0f0";

// ── LOCAL STORAGE ──
const useLS=(key,def)=>{
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}});
  const set=useCallback(fn=>{sv(p=>{const n=typeof fn==="function"?fn(p):fn;try{localStorage.setItem(key,JSON.stringify(n));}catch{}return n;});},[key]);
  return[v,set];
};

// ── CLAUDE API (ВИПРАВЛЕНО) ──
const claude=async(key,msgs,sys="",max=800)=>{
  console.log("📤 送信中...", {key: key?.substring(0,10)+"***", msgs: msgs.length, sys: sys.substring(0,50)});
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:max,
        system:sys,
        messages:msgs
      })
    });
    
    const d=await r.json();
    console.log("📥 Відповідь:", {status: r.status, error: d.error, content: d.content?.[0]?.text?.substring(0,50)});
    
    if(d.error)throw new Error(d.error.message || JSON.stringify(d.error));
    if(!d.content || !d.content[0])throw new Error("Порожня відповідь від API");
    
    return d.content.map(b=>b.text||"").join("");
  }catch(e){
    console.error("❌ API Помилка:", e);
    throw e;
  }
};

// ── VOICE ──
const useVoice=()=>{
  const syn=window.speechSynthesis;
  return {
    speak:(text,lang="uk-UA")=>{
      if(!text)return;
      const u=new SpeechSynthesisUtterance(text.substring(0,200));
      u.lang=lang;
      u.rate=0.9;
      syn.cancel();
      syn.speak(u);
    },
    stop:()=>syn.cancel()
  };
};

// ── WEEK DATES ──
const getWeekDates=()=>{
  const today=new Date();
  const dow=today.getDay();
  const mondayOffset=dow===0?-6:1-dow;
  const monday=new Date(today);
  monday.setDate(today.getDate()+mondayOffset);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return{date:d.getDate(),isToday:d.toDateString()===today.toDateString()};
  });
};

const CATS=["Всі","Сніданок","Суп","Обід","Вечеря","Десерт","Перекус"];
const DAYS_SHORT=["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];
const PLAN_MEALS=["Сні��анок","Суп","Вечеря"];
const MEAL_ICONS={Сніданок:"☀️",Суп:"🍲",Вечеря:"🌙"};

// ── RECIPE CARD ──
const RCard=({r,onOpen,onAdd,onFav,faved})=>(
  <div className="fade" style={{background:C,borderRadius:16,overflow:"hidden",marginBottom:12,cursor:"pointer"}} onClick={onOpen}>
    <div style={{background:"linear-gradient(135deg,#2a1a0a,#1a1a2a)",padding:"14px 14px 10px",display:"flex",gap:12}}>

      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:15,lineHeight:1.3,marginBottom:6}}>{r.name}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <span style={{background:"rgba(255,255,255,.1)",borderRadius:20,padding:"2px 9px",fontSize:11}}>⏱ {r.time} хв</span>
          <span style={{background:"rgba(255,255,255,.1)",borderRadius:20,padding:"2px 9px",fontSize:11}}>🔥 {r.kcal}</span>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <button onClick={e=>{e.stopPropagation();onFav();}} style={{background:"rgba(0,0,0,.4)",border:"none",color:faved?"#ff6b6b":TX,borderRadius:"50%",width:32,height:32,fontSize:17,cursor:"pointer"}}>♥</button>
        <button onClick={e=>{e.stopPropagation();onAdd();}} style={{background:A,border:"none",color:"#fff",borderRadius:"50%",width:32,height:32,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
    </div>
  </div>
);

// ── RECIPE DETAIL ──
const RDetail=({r,srv,setSrv,onBack,onPlan})=>{
  const[astep,setAstep]=useState(-1);
  const[tsec,setTsec]=useState(0);
  const[ton,setTon]=useState(false);
  const{speak}=useVoice();
  const ref=useRef();
  
  useEffect(()=>{
    if(ton&&tsec>0)ref.current=setTimeout(()=>setTsec(s=>s-1),1000);
    else if(tsec===0&&ton){setTon(false);speak("Таймер закінчився");}
    return()=>clearTimeout(ref.current);
  },[ton,tsec,speak]);
  
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  return(
    <div style={{position:"fixed",inset:0,background:BG,zIndex:100,maxWidth:430,margin:"0 auto",overflowY:"auto"}}>
      {ton&&tsec>0&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",maxWidth:430,width:"100%",zIndex:200,background:A,padding:"11px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:800,fontSize:20}}>⏱ {fmt(tsec)}</span>
        <button onClick={()=>setTon(false)} style={{background:"rgba(0,0,0,.3)",border:"none",color:"#fff",borderRadius:20,padding:"5px 16px",cursor:"pointer"}}>стоп</button>
      </div>}

      <div style={{background:"linear-gradient(135deg,#2a1a0a,#1a1a2a)",padding:"60px 20px 24px",position:"relative"}}>
        <button onClick={onBack} style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.5)",border:"none",color:"#fff",borderRadius:"50%",width:42,height:42,fontSize:20,cursor:"pointer"}}>←</button>
        <div style={{fontSize:64,marginBottom:10}}>{r.e||"🍽️"}</div>
        <div style={{fontWeight:800,fontSize:24,lineHeight:1.2,marginBottom:8}}>{r.name}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <span style={{background:"rgba(255,255,255,.15)",borderRadius:20,padding:"4px 12px",fontSize:12}}>⏱ {r.time} хв</span>
          <span style={{background:"rgba(255,255,255,.15)",borderRadius:20,padding:"4px 12px",fontSize:12}}>📂 {r.cat}</span>
        </div>
      </div>

      <div style={{padding:"20px 20px 100px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,background:C,borderRadius:12,padding:"10px 16px",marginBottom:16}}>
          <span style={{fontSize:13,color:MU,flex:1}}>Порцій:</span>
          <button onClick={()=>setSrv(s=>Math.max(1,s-1))} style={{background:C2,border:"none",color:TX,borderRadius:"50%",width:30,height:30,fontSize:20,cursor:"pointer"}}>−</button>
          <span style={{fontWeight:800,fontSize:20,minWidth:26,textAlign:"center"}}>{srv}</span>
          <button onClick={()=>setSrv(s=>s+1)} style={{background:C2,border:"none",color:TX,borderRadius:"50%",width:30,height:30,fontSize:20,cursor:"pointer"}}>+</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>
          {[{l:"Ккал",v:Math.round((r.kcal||0)*srv/4),c:A},{l:"Білки",v:Math.round((r.p||0)*srv/4)+"г",c:G},{l:"Жири",v:Math.round((r.f||0)*srv/4)+"г"},{l:"Вугл.",v:Math.round((r.c||0)*srv/4)+"г"}].map((m,i)=>(
            <div key={i} style={{background:C,borderRadius:12,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontWeight:800,fontSize:18,color:m.c||TX}}>{m.v}</div>
              <div style={{fontSize:10,color:MU,marginTop:2}}>{m.l}</div>
            </div>
          ))}
        </div>

        <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>Інгредієнти</div>
        <div style={{background:C,borderRadius:14,overflow:"hidden",marginBottom:20}}>
          {(r.ing||[]).map((ing,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:i<(r.ing||[]).length-1?`1px solid ${BR}`:"none"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:A,flexShrink:0}}/>
              <div style={{flex:1,fontSize:14}}>{ing.n}</div>
              <div style={{fontSize:13,fontWeight:600,color:A}}>{ing.a}</div>
            </div>
          ))}
        </div>

        <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>Приготування</div>
        {(r.steps||[]).map((step,i)=>{
          const mins=step.match(/(\d+)\s*хв/);
          const act=astep===i;
          return(
            <div key={i} onClick={()=>setAstep(act?-1:i)} style={{display:"flex",gap:12,marginBottom:10,padding:"10px",background:act?C:"transparent",borderRadius:12,cursor:"pointer"}}>
              <div style={{background:act?A:C2,color:"#fff",borderRadius:"50%",width:30,height:30,minWidth:30,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,lineHeight:1.7,color:act?TX:SO}}>{step}</div>
                {act&&mins&&<button onClick={e=>{e.stopPropagation();setTsec(parseInt(mins[1])*60);setTon(true);speak(`Таймер ${mins[1]} хвилин`);}} style={{marginTop:8,background:C2,border:"none",color:A,borderRadius:8,padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>⏱ Таймер {mins[1]} хв</button>}
              </div>
            </div>
          );
        })}

        <button onClick={()=>onPlan(r)} style={{width:"100%",padding:14,background:A,border:"none",color:"#fff",borderRadius:12,fontWeight:700,fontSize:14,cursor:"pointer",marginTop:20}}>+ В раціон</button>
      </div>
    </div>
  );
};

// ── RECIPES PAGE ──
const RecipesPage=({faves,onFav,onAdd,onOpen,myRecs,setMyRecs,apiKey})=>{
  const[sub,setSub]=useState("browse");
  const[cat,setCat]=useState("Всі");
  const[search,setSearch]=useState("");
  const[ttText,setTtText]=useState("");
  const[ttLoad,setTtLoad]=useState(false);

  const DB=window.RECIPES_DB||[];
  const allR=useMemo(()=>[...DB,...myRecs],[myRecs]);

  const filtered=useMemo(()=>{
    let r=allR;
    if(cat!=="Всі")r=r.filter(x=>x.cat===cat);
    if(search){const q=search.toLowerCase();r=r.filter(x=>x.name.toLowerCase().includes(q));}
    return r;
  },[allR,cat,search]);

  const importTT=async()=>{
    if(!ttText.trim())return;
    if(!apiKey){alert("Потрібен API ключ → ⚙️");return;}
    setTtLoad(true);
    try{
      const raw=await claude(apiKey,[{role:"user",content:`Витягни рецепт JSON:\n{"name":"","cat":"Сніданок|Суп|Обід|Вечеря|Десерт","time":30,"kcal":250,"p":10,"f":12,"c":20,"e":"🍽️","ing":[{"n":"","a":""}],"steps":[""]}\n\nТекст:\n${ttText}`}],"Тільки JSON",500);
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setMyRecs(p=>[{...parsed,id:"tt_"+Date.now()},...p]);
      setTtText("");setSub("mine");
      alert(`✅ "${parsed.name}" збережено!`);
    }catch(e){alert("Помилка: "+e.message);}
    setTtLoad(false);
  };

  const inp={background:C,border:`1px solid ${BR}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:TX,outline:"none",width:"100%"};

  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontWeight:800,fontSize:26,marginBottom:12}}>🍽️ Рецепти ({DB.length})</div>

      <div style={{display:"flex",background:C,borderRadius:20,padding:3,marginBottom:14,gap:2}}>
        {[["browse","🔍 Пошук"],["tiktok","📱 TikTok"],["mine","⭐ Мої"]].map(([v,l])=>(
          <button key={v} onClick={()=>setSub(v)} style={{flex:1,background:sub===v?A:"transparent",border:"none",color:sub===v?"#fff":MU,borderRadius:18,padding:"7px 2px",fontSize:11,cursor:"pointer",fontWeight:sub===v?700:400}}>{l}</button>
        ))}
      </div>

      {sub==="browse"&&<>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Пошук..." style={{...inp,marginBottom:10}}/>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:8}}>
          {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?A:C,border:"none",color:cat===c?"#fff":MU,borderRadius:20,padding:"7px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontWeight:cat===c?700:400}}>{c}</button>)}
        </div>
        <div style={{fontSize:12,color:MU,marginBottom:10}}>📊 {filtered.length} рецептів</div>
        {filtered.map(r=><RCard key={r.id} r={r} onOpen={()=>onOpen(r)} onAdd={()=>onAdd(r)} onFav={()=>onFav(r.id)} faved={faves.includes(r.id)}/>)}
      </>}

      {sub==="tiktok"&&<>
        <div style={{background:C,borderRadius:16,padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>📱 Рецепт з TikTok</div>
          <textarea value={ttText} onChange={e=>setTtText(e.target.value)} placeholder="Скопіюй текст рецепту сюди..." rows={8} style={{...inp,resize:"none",marginBottom:10}}/>
          <button onClick={importTT} disabled={ttLoad||!ttText.trim()} style={{width:"100%",padding:12,background:ttLoad||!ttText.trim()?"#444":A,border:"none",color:"#fff",borderRadius:10,fontWeight:700,cursor:ttLoad||!ttText.trim()?"not-allowed":"pointer"}}>{ttLoad?"⏳...":"📥 Зберегти"}</button>
        </div>
      </>}

      {sub==="mine"&&<>
        {!myRecs.length&&<div style={{textAlign:"center",padding:"40px 20px",color:MU}}>⭐ Тут будуть твої рецепти</div>}
        {myRecs.map(r=><RCard key={r.id} r={r} onOpen={()=>onOpen(r)} onAdd={()=>onAdd(r)} onFav={()=>onFav(r.id)} faved={faves.includes(r.id)}/>)}
      </>}
    </div>
  );
};

// ── PLAN PAGE ──
const PlanPage=({plan,setPlan})=>{
  const weekDates=useMemo(()=>getWeekDates(),[]);
  const[selDay,setSelDay]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const DB=window.RECIPES_DB||[];

  const gen=()=>{
    const np={...plan};
    PLAN_MEALS.forEach(meal=>{
      const pool=DB.filter(r=>r.cat===meal);
      if(pool.length){
        const r=pool[Math.floor(Math.random()*pool.length)];
        np[`${selDay}-${meal}`]=[r];
      }
    });
    setPlan(np);
  };

  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:26}}>📅 Раціон</div>
        <button onClick={gen} style={{padding:"7px 14px",background:A,border:"none",color:"#fff",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer"}}>✨ День</button>
      </div>

      <div style={{display:"flex",overflowX:"auto",marginBottom:14,gap:2}}>
        {weekDates.map((d,i)=>(
          <div key={i} onClick={()=>setSelDay(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:46,cursor:"pointer"}}>
            <div style={{fontSize:10,color:d.isToday?A:selDay===i?TX:MU,marginBottom:4,fontWeight:600}}>{DAYS_SHORT[i]}</div>
            <div style={{width:36,height:36,borderRadius:"50%",background:selDay===i?A:d.isToday?"rgba(232,83,10,.2)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:selDay===i?"#fff":MU}}>{d.date}</div>
          </div>
        ))}
      </div>

      {PLAN_MEALS.map(meal=>{
        const k=`${selDay}-${meal}`;
        const items=plan[k]||[];
        return(
          <div key={meal} style={{background:C,borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>{MEAL_ICONS[meal]} {meal}</div>
            {items.map((r,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"9px 0",borderTop:`1px solid ${BR}`}}>
                <div style={{fontSize:28,flexShrink:0}}>{r.e}</div>
                <div style={{flex:1}}><div style={{fontWeight:600}}>{r.name}</div><div style={{fontSize:12,color:MU}}>⏱ {r.time} хв</div></div>
              </div>
            ))}
            {!items.length&&<div style={{color:MU,fontSize:13,paddingTop:4}}>Порожньо</div>}
          </div>
        );
      })}
    </div>
  );
};

// ── CALORIES PAGE ──
const CaloriesPage=({apiKey})=>{
  const[diary,setDiary]=useLS("khawk_diary5",[]);
  const[goal,setGoal]=useLS("khawk_goal5",2000);
  const[aiQ,setAiQ]=useState("");
  const[aiLoad,setAiLoad]=useState(false);
  const[aiRes,setAiRes]=useState(null);

  const tot=diary.reduce((a,x)=>({kcal:a.kcal+(+x.kcal||0),p:a.p+(+x.p||0)}),{kcal:0,p:0});
  const pct=Math.min(tot.kcal/goal,1);

  const askAI=async()=>{
    if(!aiQ.trim()||!apiKey)return;
    setAiLoad(true);
    try{
      const raw=await claude(apiKey,[{role:"user",content:`Калорії: "${aiQ}". JSON: {"name":"","e":"🍽️","kcal":250}`}],"Короткий ответ",300);
      setAiRes(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    }catch(e){setAiRes({name:aiQ,kcal:200,e:"🍽️"});}
    setAiLoad(false);
  };

  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontWeight:800,fontSize:26,marginBottom:14}}>📊 Калорії</div>
      <div style={{textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:48,marginBottom:8}}>{tot.kcal}</div>
        <div style={{fontSize:13,color:MU}}>/ {goal} ккал ({Math.round(pct*100)}%)</div>
      </div>

      <div style={{display:"flex",gap:8}}>
        <input value={aiQ} onChange={e=>setAiQ(e.target.value)} placeholder="Що з'їв?" style={{flex:1,background:C,border:`1px solid ${BR}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:TX,outline:"none"}}/>
        <button onClick={askAI} disabled={aiLoad} style={{padding:"10px 16px",background:aiLoad?"#444":A,border:"none",color:"#fff",borderRadius:10,cursor:"pointer",fontWeight:700}}>→</button>
      </div>

      {aiRes&&<div style={{marginTop:10,background:C,padding:12,borderRadius:10}}>
        <div style={{fontSize:14,fontWeight:600}}>{aiRes.e} {aiRes.name}</div>
        <div style={{fontSize:13,color:A,fontWeight:700,marginTop:4}}>{aiRes.kcal} ккал</div>
        <button onClick={()=>{setDiary(p=>[...p,{...aiRes,id:Date.now()}]);setAiRes(null);setAiQ("");}} style={{marginTop:8,width:"100%",background:A,color:"#fff",border:"none",padding:8,borderRadius:8,cursor:"pointer"}}>+ Додати</button>
      </div>}

      <div style={{marginTop:14}}>
        {diary.map(e=>(
          <div key={e.id} style={{background:C,padding:10,marginBottom:6,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span>{e.e} {e.name}</span></div>
            <button onClick={()=>setDiary(p=>p.filter(x=>x.id!==e.id))} style={{background:"none",border:"none",color:MU,cursor:"pointer"}}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── CHAT PAGE (ВИПРАВЛЕНО) ──
const ChatPage=({apiKey})=>{
  const[msgs,setMsgs]=useState([{r:"ai",t:"Привіт! 👨‍🍳 Я кухонний асистент. Питай про рецепти, калорії, інгредієнти!"}]);
  const[inp,setInp]=useState("");
  const[load,setLoad]=useState(false);
  const[hist,setHist]=useState([]);
  const{speak}=useVoice();
  const bot=useRef();

  useEffect(()=>bot.current?.scrollIntoView(),[msgs]);

  const send=async(t="")=>{
    const text=t||inp;
    if(!text.trim()||load||!apiKey)return;
    
    setInp("");
    setMsgs(p=>[...p,{r:"u",t:text}]);
    setLoad(true);

    try{
      const DB=window.RECIPES_DB||[];
      const recipeInfo=DB.slice(0,3).map(r=>`${r.name} (${r.cat}, ${r.time}хв)`).join("; ");
      
      const nh=[...hist,{role:"user",content:text}];
      const reply=await claude(apiKey,nh,`Кухонний AI. Українська. В базі: ${recipeInfo}. Коротко!`,400);
      
      setHist([...nh,{role:"assistant",content:reply}]);
      setMsgs(p=>[...p,{r:"ai",t:reply}]);
      speak(reply.substring(0,100));
    }catch(e){
      setMsgs(p=>[...p,{r:"ai",t:"❌ "+e.message}]);
    }
    setLoad(false);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100dvh - 62px)"}}>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px 0"}}>
        <div style={{fontWeight:800,fontSize:26,marginBottom:16}}>💬 AI Асистент</div>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start",gap:8,marginBottom:12}}>
            {m.r==="ai"&&<div style={{fontSize:24}}>👨‍🍳</div>}
            <div style={{maxWidth:"80%",background:m.r==="u"?A:C,padding:12,borderRadius:12,color:"#fff",lineHeight:1.5}}>
              {m.t}
            </div>
          </div>
        ))}
        {load&&<div style={{textAlign:"center",color:MU,fontSize:12}}>⏳ Думаю...</div>}
        <div ref={bot}/>
      </div>

      <div style={{padding:"10px 16px",background:"#111",borderTop:`1px solid ${BR}`,display:"flex",gap:8}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Питай..." style={{flex:1,background:C,border:`1px solid ${BR}`,borderRadius:24,padding:"11px 16px",fontSize:14,color:TX,outline:"none"}}/>
        <button onClick={()=>send()} disabled={load||!apiKey} style={{padding:"11px 18px",background:load||!apiKey?"#444":A,color:"#fff",border:"none",borderRadius:24,fontWeight:700,cursor:"pointer"}}>➤</button>
      </div>
    </div>
  );
};

// ── SETTINGS PAGE ──
const SettingsPage=({apiKey,setApiKey})=>{
  const[k,setK]=useState(apiKey);
  const[ok,setOk]=useState(false);

  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontWeight:800,fontSize:26,marginBottom:20}}>⚙️ Налаштування</div>
      <div style={{background:C,borderRadius:16,padding:16}}>
        <div style={{fontWeight:700,marginBottom:6}}>🔑 Claude API ключ</div>
        <div style={{fontSize:12,color:MU,marginBottom:10}}>Скопіюй з https://console.anthropic.com/</div>
        <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-..." style={{background:C2,border:`1px solid ${BR}`,borderRadius:10,padding:"11px 14px",color:TX,outline:"none",width:"100%",marginBottom:10,fontFamily:"monospace",fontSize:12}}/>
        <button onClick={()=>{setApiKey(k);localStorage.setItem("khawk_key5",JSON.stringify(k));setOk(true);setTimeout(()=>setOk(false),2000);}} style={{width:"100%",padding:12,background:ok?G:A,border:"none",color:"#fff",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:14}}>
          {ok?"✓ OK":"Зберегти"}
        </button>
        {apiKey&&<div style={{fontSize:11,color:G,marginTop:8,textAlign:"center"}}>✓ Активний: {apiKey.substring(0,10)}...***</div>}
      </div>
    </div>
  );
};

// ── APP ──
const App=()=>{
  const[tab,setTab]=useState("chat");
  const[apiKey,setApiKey]=useLS("khawk_key5","");
  const[faves,setFaves]=useLS("khawk_faves5",[]);
  const[plan,setPlan]=useLS("khawk_plan5",{});
  const[myRecs,setMyRecs]=useLS("khawk_mine5",[]);
  const[detail,setDetail]=useState(null);
  const[srv,setSrv]=useState(4);

  const toggleFav=id=>setFaves(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  return(
    <div style={{background:BG,minHeight:"100dvh",color:TX,display:"flex",flexDirection:"column"}}>
      {detail&&<RDetail r={detail} srv={srv} setSrv={setSrv} onBack={()=>setDetail(null)} onPlan={r=>{setPlan(p=>({...p,[`0-${r.cat}`]:[...(p[`0-${r.cat}`]||[]),r]}));setDetail(null);}}/>}

      <div style={{flex:1,overflowY:tab==="chat"?"hidden":"auto",paddingBottom:tab==="chat"?0:80}}>
        {tab==="recipes"&&<RecipesPage faves={faves} onFav={toggleFav} onAdd={()=>{}} onOpen={r=>setDetail(r)} myRecs={myRecs} setMyRecs={setMyRecs} apiKey={apiKey}/>}
        {tab==="plan"&&<PlanPage plan={plan} setPlan={setPlan}/>}
        {tab==="calories"&&<CaloriesPage apiKey={apiKey}/>}
        {tab==="chat"&&<ChatPage apiKey={apiKey}/>}
        {tab==="settings"&&<SettingsPage apiKey={apiKey} setApiKey={setApiKey}/>}
      </div>

      <div style={{background:"#111",display:"flex",position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,borderTop:`1px solid ${BR}`,zIndex:50}}>
        {[{id:"chat",icon:"💬",l:"Чат"},{id:"recipes",icon:"📖",l:"Рецепти"},{id:"plan",icon:"📅",l:"Меню"},{id:"calories",icon:"📊",l:"Калорії"},{id:"settings",icon:"⚙️",l:"Налашт."}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 0",border:"none",background:"none",color:tab===t.id?A:MU,cursor:"pointer",fontSize:9,fontWeight:tab===t.id?700:400}}>
            <span style={{fontSize:18}}>{t.icon}</span>{t.l}
          </button>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
