<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KitchenHawk">
<meta name="theme-color" content="#1a1a1a">
<title>🍽️ KitchenHawk Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#f0f0f0;overscroll-behavior:none}
#root{max-width:430px;margin:0 auto;min-height:100dvh}
::-webkit-scrollbar{width:0;height:0}
input,select,textarea,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.fade{animation:fadeUp .25s ease}
.pulse{animation:pulse 1.5s infinite}
</style>

<body>
<div id="root"></div>

<script src="recipes.js"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const A="#e8530a",G="#2d7a1f",BG="#1a1a1a",C="#242424",C2="#2e2e2e",BR="#333",MU="#666",SO="#999",TX="#f0f0f0";

// ── LOCAL STORAGE ──
const useLS=(key,def)=>{
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}});
  const set=useCallback(fn=>{sv(p=>{const n=typeof fn==="function"?fn(p):fn;try{localStorage.setItem(key,JSON.stringify(n));}catch{}return n;});},[key]);
  return[v,set];
};

// ── CLAUDE API ──
const claude=async(key,msgs,sys="",max=800)=>{
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,system:sys,messages:msgs})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("");
};

// ── VOICE ──
const useVoice=()=>{
  const syn=window.speechSynthesis;
  return {
    speak:(text,lang="uk-UA")=>{
      const u=new SpeechSynthesisUtterance(text);
      u.lang=lang;
      u.rate=1;
      syn.cancel();
      syn.speak(u);
    },
    stop:()=>syn.cancel(),
    isSupported:!!syn
  };
};

// ── SPEECH RECOGNITION ──
const useSpeechRecognition=()=>{
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  const[listening,setListening]=useState(false);
  const[text,setText]=useState("");
  
  const start=useCallback(()=>{
    if(!SpeechRecognition)return;
    const rec=new SpeechRecognition();
    rec.lang="uk-UA";
    rec.onstart=()=>setListening(true);
    rec.onresult=e=>{
      const t=[...e.results].map(r=>r[0].transcript).join("");
      setText(t);
    };
    rec.onend=()=>setListening(false);
    rec.start();
  },[]);

  return{listening,text,setText,start,isSupported:!!SpeechRecognition};
};

// ── GET REAL WEEK DATES ──
const getWeekDates=()=>{
  const today=new Date();
  const dow=today.getDay();
  const mondayOffset=dow===0?-6:1-dow;
  const monday=new Date(today);
  monday.setDate(today.getDate()+mondayOffset);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return{date:d.getDate(),isToday:d.toDateString()===today.toDateString(),fullDate:d};
  });
};

const CATS=["Всі","Сніданок","Суп","Обід","Вечеря","Десерт","Перекус"];
const DAYS_SHORT=["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];
const PLAN_MEALS=["Сніданок","Суп","Вечеря"];
const MEAL_ICONS={Сніданок:"☀️",Суп:"🍲",Вечеря:"🌙"};

// ── RECIPE CARD ──
const RCard=({r,onOpen,onAdd,onFav,faved,onHide})=>(
  <div className="fade" style={{background:C,borderRadius:16,overflow:"hidden",marginBottom:12,cursor:"pointer",position:"relative"}} onClick={onOpen}>
    <div style={{background:"linear-gradient(135deg,#2a1a0a,#1a1a2a)",padding:"14px 14px 10px",display:"flex",gap:12,position:"relative"}}>
      <div style={{fontSize:42,flexShrink:0,lineHeight:1}}>{r.e||"🍽️"}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:15,lineHeight:1.3,marginBottom:6}}>{r.name}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <span style={{background:"rgba(255,255,255,.1)",borderRadius:20,padding:"2px 9px",fontSize:11}}>⏱ {r.time} хв</span>
          <span style={{background:"rgba(255,255,255,.1)",borderRadius:20,padding:"2px 9px",fontSize:11}}>🔥 {r.kcal} ккал</span>
          {r.batch&&<span style={{background:"rgba(255,107,53,.3)",borderRadius:20,padding:"2px 9px",fontSize:11}}>🔁 Batch</span>}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
        <button onClick={e=>{e.stopPropagation();onFav();}} style={{background:"rgba(0,0,0,.4)",border:"none",color:faved?"#ff6b6b":TX,borderRadius:"50%",width:32,height:32,fontSize:17,cursor:"pointer"}}>♥</button>
        <button onClick={e=>{e.stopPropagation();onAdd();}} style={{background:A,border:"none",color:"#fff",borderRadius:"50%",width:32,height:32,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
    </div>
    {onHide&&<button onClick={e=>{e.stopPropagation();onHide();}} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.6)",border:"none",color:"#ff4444",borderRadius:"50%",width:28,height:28,fontSize:16,cursor:"pointer"}}>✕</button>}
    <div style={{padding:"6px 14px 10px",display:"flex",gap:4,flexWrap:"wrap"}}>
      {(r.tags||[]).slice(0,3).map((t,i)=><span key={i} style={{background:C2,borderRadius:10,padding:"2px 8px",fontSize:11,color:SO}}>{t}</span>)}
    </div>
  </div>
);

// ── RECIPE DETAIL ──
const RDetail=({r,srv,setSrv,onBack,onPlan,onHide})=>{
  const[astep,setAstep]=useState(-1);
  const[tsec,setTsec]=useState(0);
  const[ton,setTon]=useState(false);
  const{speak}=useVoice();
  const ref=useRef();
  useEffect(()=>{
    if(ton&&tsec>0)ref.current=setTimeout(()=>setTsec(s=>s-1),1000);
    else if(tsec===0&&ton)setTon(false);
    return()=>clearTimeout(ref.current);
  },[ton,tsec]);
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  return(
    <div style={{position:"fixed",inset:0,background:BG,zIndex:100,maxWidth:430,margin:"0 auto",overflowY:"auto"}}>
      {ton&&tsec>0&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",maxWidth:430,width:"100%",zIndex:200,background:A,padding:"11px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontWeight:800,fontSize:20}}>⏱ {fmt(tsec)}</span>
        <button onClick={()=>{setTon(false);speak("Таймер закінчився");}} style={{background:"rgba(0,0,0,.3)",border:"none",color:"#fff",borderRadius:20,padding:"5px 16px",cursor:"pointer"}}>стоп</button>
      </div>}

      <div style={{background:"linear-gradient(135deg,#2a1a0a,#1a1a2a)",padding:"60px 20px 24px",position:"relative"}}>
        <button onClick={onBack} style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.5)",border:"none",color:"#fff",borderRadius:"50%",width:42,height:42,fontSize:20,cursor:"pointer"}}>←</button>
        {onHide&&<button onClick={()=>{onHide();onBack();}} style={{position:"absolute",top:16,right:16,background:"rgba(255,68,68,.3)",border:"none",color:"#ff4444",borderRadius:"50%",width:42,height:42,fontSize:20,cursor:"pointer"}}>✕</button>}
        <div style={{fontSize:64,marginBottom:10}}>{r.e||"🍽️"}</div>
        <div style={{fontWeight:800,fontSize:24,lineHeight:1.2,marginBottom:8}}>{r.name}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <span style={{background:"rgba(255,255,255,.15)",borderRadius:20,padding:"4px 12px",fontSize:12}}>⏱ {r.time} хв</span>
          <span style={{background:"rgba(255,255,255,.15)",borderRadius:20,padding:"4px 12px",fontSize:12}}>📂 {r.cat}</span>
          {r.batch&&<span style={{background:"rgba(255,107,53,.4)",borderRadius:20,padding:"4px 12px",fontSize:12}}>🔁 Batch</span>}
        </div>
      </div>

      <div style={{padding:"20px 20px 100px"}}>
        {r.batch&&r.bn&&<div style={{background:"rgba(255,107,53,.12)",border:"1px solid #ff6b35",borderRadius:12,padding:"10px 14px",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:12,color:"#ff6b35",marginBottom:3}}>🔁 Готуй на кілька днів:</div>
          <div style={{fontSize:13,color:"#ffb89a"}}>{r.bn}</div>
        </div>}

        {r.cookpad&&<a href={r.cookpad} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,87,34,.1)",border:"1px solid rgba(255,87,34,.3)",borderRadius:12,padding:"10px 14px",marginBottom:16,textDecoration:"none",color:TX}}>
          <span style={{fontSize:20}}>📸</span>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>Дивись фото й відео на Cookpad</div>
            <div style={{fontSize:11,color:MU}}>cookpad.com/ua — покрокові фото</div>
          </div>
          <span style={{marginLeft:"auto",fontSize:16,color:A}}>→</span>
        </a>}

        <div style={{display:"flex",alignItems:"center",gap:12,background:C,borderRadius:12,padding:"10px 16px",marginBottom:16}}>
          <span style={{fontSize:13,color:MU,flex:1}}>Кількість порцій:</span>
          <button onClick={()=>setSrv(s=>Math.max(1,s-1))} style={{background:C2,border:"none",color:TX,borderRadius:"50%",width:30,height:30,fontSize:20,cursor:"pointer"}}>−</button>
          <span style={{fontWeight:800,fontSize:20,minWidth:26,textAlign:"center"}}>{srv}</span>
          <button onClick={()=>setSrv(s=>s+1)} style={{background:C2,border:"none",color:TX,borderRadius:"50%",width:30,height:30,fontSize:20,cursor:"pointer"}}>+</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>
          {[{l:"Ккал",v:Math.round((r.kcal||0)*srv/4),c:A},{l:"Білки",v:Math.round((r.p||0)*srv/4)+"г",c:G},{l:"Жири",v:Math.round((r.f||0)*srv/4)+"г"},{l:"Вугл.",v:Math.round((r.c||0)*srv/4)+"г"}].map((m,i)=>(
            <div key={i} style={{background:C,borderRadius:12,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontWeight:800,fontSize:18,color:m.c||TX}}>{m.v}</div>
              <div style={{fontSize:10,color:MU,marginTop:2}}>{m.l}</div>
            </div>
          ))}
        </div>

        <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>Інгредієнти</div>
        <div style={{background:C,borderRadius:14,overflow:"hidden",marginBottom:20}}>
          {(r.ing||[]).map((ing,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:i<(r.ing||[]).length-1?`1px solid ${BR}`:"none"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:A,flexShrink:0}}/>
              <div style={{flex:1,fontSize:14}}>{ing.n}</div>
              <div style={{fontSize:13,fontWeight:600,color:A}}>{ing.a}</div>
            </div>
          ))}
        </div>

        <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>Приготування</div>
        {(r.steps||[]).map((step,i)=>{
          const mins=step.match(/(\d+)\s*хв/);
          const act=astep===i;
          return(
            <div key={i} onClick={()=>setAstep(act?-1:i)} style={{display:"flex",gap:12,marginBottom:10,padding:"10px",background:act?C:"transparent",borderRadius:12,cursor:"pointer",transition:"background .2s"}}>
              <div style={{background:act?A:C2,color:"#fff",borderRadius:"50%",width:30,height:30,minWidth:30,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,transition:"background .2s"}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,lineHeight:1.7,color:act?TX:SO}}>{step}</div>
                {act&&mins&&<button onClick={e=>{e.stopPropagation();setTsec(parseInt(mins[1])*60);setTon(true);speak(`Таймер ${mins[1]} хвилин`);}} style={{marginTop:8,background:C2,border:"none",color:A,borderRadius:8,padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>⏱ Таймер {mins[1]} хв</button>}
              </div>
            </div>
          );
        })}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:20}}>
          {r.cookpad&&<a href={r.cookpad} target="_blank" rel="noreferrer" style={{padding:14,background:C,border:`1px solid ${BR}`,color:TX,borderRadius:12,fontWeight:600,fontSize:13,cursor:"pointer",textAlign:"center",textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>📸 Cookpad</a>}
          <button onClick={()=>onPlan(r)} style={{padding:14,background:A,border:"none",color:"#fff",borderRadius:12,fontWeight:700,fontSize:14,cursor:"pointer",gridColumn:r.cookpad?"auto":"1/-1"}}>+ В раціон</button>
        </div>
      </div>
    </div>
  );
};

// ── RECIPES PAGE ──
const RecipesPage=({faves,onFav,onAdd,onOpen,myRecs,setMyRecs,apiKey,hidden,setHidden})=>{
  const[sub,setSub]=useState("browse");
  const[cat,setCat]=useState("Всі");
  const[search,setSearch]=useState("");
  const[batch,setBatch]=useState(false);
  const[sort,setSort]=useState("def");
  const[ingr,setIngr]=useState("");
  const[ttText,setTtText]=useState("");
  const[ttLoad,setTtLoad]=useState(false);
  const{listening,text,setText,start:startListening,isSupported}=useSpeechRecognition();
  const{speak}=useVoice();

  const DB=window.RECIPES_DB||[];
  const allR=useMemo(()=>[...DB,...myRecs].filter(r=>!hidden.includes(r.id)),[myRecs,hidden]);

  const filtered=useMemo(()=>{
    let r=allR;
    if(cat!=="Всі")r=r.filter(x=>x.cat===cat);
    if(batch)r=r.filter(x=>x.batch);
    if(search){const q=search.toLowerCase();r=r.filter(x=>x.name.toLowerCase().includes(q)||(x.main||[]).some(m=>m.toLowerCase().includes(q))||(x.tags||[]).some(t=>t.includes(q)));}
    if(sort==="ta")r=[...r].sort((a,b)=>a.time-b.time);
    else if(sort==="td")r=[...r].sort((a,b)=>b.time-a.time);
    else if(sort==="ka")r=[...r].sort((a,b)=>a.kcal-b.kcal);
    else if(sort==="kd")r=[...r].sort((a,b)=>b.kcal-a.kcal);
    return r;
  },[allR,cat,batch,search,sort]);

  const fridgeRes=useMemo(()=>{
    if(!ingr.trim())return[];
    const qs=ingr.toLowerCase().split(/[,\s]+/).filter(Boolean);
    return allR.filter(r=>(r.main||[]).some(m=>qs.some(q=>m.toLowerCase().includes(q)))).sort((a,b)=>{
      const sa=(a.main||[]).filter(m=>qs.some(q=>m.toLowerCase().includes(q))).length;
      const sb=(b.main||[]).filter(m=>qs.some(q=>m.toLowerCase().includes(q))).length;
      return sb-sa;
    });
  },[allR,ingr]);

  const importTT=async()=>{
    if(!ttText.trim())return;
    if(!apiKey){alert("Потрібен API ключ → ⚙️");return;}
    setTtLoad(true);
    try{
      const raw=await claude(apiKey,[{role:"user",content:`Витягни рецепт з цього тексту. ТІЛЬКИ JSON:\n{"name":"назва","cat":"Сніданок або Суп або Обід або Вечеря або Десерт","time":хвилини,"kcal":число,"p":білки,"f":жири,"c":вуглеводи,"e":"emoji","tags":["тег"],"main":["головний інгредієнт"],"ing":[{"n":"інгредієнт","a":"кількість"}],"steps":["крок1","крок2"]}\n\nТекст:\n${ttText}`}],"Відповідай тільки JSON без markdown.",600);
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setMyRecs(p=>[{...parsed,id:"tt_"+Date.now(),source:"tiktok"},...p]);
      setTtText("");setSub("mine");
      speak("Рецепт збережено!");
      alert(`✅ "${parsed.name}" збережено!`);
    }catch(e){speak("Помилка");alert("Помилка: "+e.message);}
    setTtLoad(false);
  };

  const inp={background:C,border:`1px solid ${BR}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:TX,outline:"none",width:"100%"};

  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontWeight:800,fontSize:26,marginBottom:12}}>🍽️ Рецепти</div>

      <div style={{display:"flex",background:C,borderRadius:20,padding:3,marginBottom:14,gap:2}}>
        {[["browse","🔍 Пошук"],["fridge","🥬 Холод."],["tiktok","📱 TikTok"],["mine","⭐ Мої"]].map(([v,l])=>(
          <button key={v} onClick={()=>setSub(v)} style={{flex:1,background:sub===v?A:"transparent",border:"none",color:sub===v?"#fff":MU,borderRadius:18,padding:"7px 2px",fontSize:11,cursor:"pointer",fontWeight:sub===v?700:400}}>{l}</button>
        ))}
      </div>

      {/* BROWSE */}
      {sub==="browse"&&<>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Борщ, курка..." style={{...inp,flex:1}}/>
          {isSupported&&<button onClick={startListening} style={{background:listening?A:"rgba(232,83,10,.2)",border:"none",color:listening?"#fff":A,borderRadius:10,padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:16}}>🎤</button>}
        </div>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:8}}>
          {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?A:C,border:"none",color:cat===c?"#fff":MU,borderRadius:20,padding:"7px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontWeight:cat===c?700:400}}>{c}</button>)}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{flex:1,background:C2,border:`1px solid ${BR}`,borderRadius:10,padding:"8px 10px",fontSize:12,color:TX,outline:"none",cursor:"pointer"}}>
            <option value="def">Без сортування</option>
            <option value="ta">⏱ Швидкі</option>
            <option value="td">⏱ Довгі</option>
            <option value="ka">🔥 Менше</option>
            <option value="kd">🔥 Більше</option>
          </select>
          <button onClick={()=>setBatch(!batch)} style={{background:batch?"#ff6b35":C,border:batch?"none":`1px solid ${BR}`,color:batch?"#fff":MU,borderRadius:10,padding:"8px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>🔁 Batch</button>
        </div>
        <div style={{fontSize:12,color:MU,marginBottom:10}}>{filtered.length} рецептів</div>
        {filtered.map(r=><RCard key={r.id} r={r} onOpen={()=>onOpen(r)} onAdd={()=>onAdd(r)} onFav={()=>onFav(r.id)} faved={faves.includes(r.id)} onHide={()=>setHidden(p=>[...p,r.id])}/>)}
      </>}

      {/* FRIDGE */}
      {sub==="fridge"&&<>
        <div style={{fontSize:13,color:MU,marginBottom:8}}>Що є вдома? Через кому:</div>
        <input value={ingr} onChange={e=>setIngr(e.target.value)} placeholder="курка, картопля, помідори..." style={{...inp,marginBottom:12}}/>
        {ingr&&<div style={{fontSize:12,color:MU,marginBottom:10}}>Знайдено: {fridgeRes.length}</div>}
        {fridgeRes.map(r=><RCard key={r.id} r={r} onOpen={()=>onOpen(r)} onAdd={()=>onAdd(r)} onFav={()=>onFav(r.id)} faved={faves.includes(r.id)} onHide={()=>setHidden(p=>[...p,r.id])}/>)}
        {!ingr&&<div style={{textAlign:"center",padding:"40px 20px",color:MU}}><div style={{fontSize:44,marginBottom:10}}>🥬</div>Введи інгредієнти</div>}
      </>}

      {/* TIKTOK */}
      {sub==="tiktok"&&<>
        <div style={{background:C,borderRadius:16,padding:18,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>📱 Рецепт з TikTok або Cookpad</div>
          <div style={{fontSize:13,color:MU,marginBottom:12,lineHeight:1.6}}>Скопіюй текст → AI збереже</div>
          <textarea value={ttText} onChange={e=>setTtText(e.target.value)} placeholder="Банан - 1 шт\nЯйця - 2 шт\n\nЗмішай..." rows={8} style={{...inp,resize:"none",lineHeight:1.6,fontSize:13,marginBottom:12}}/>

// ── PLAN PAGE ──
const PlanPage=({plan,setPlan,shop,setShop,srv,setSrv})=>{
  const weekDates=useMemo(()=>getWeekDates(),[]);
  const[selDay,setSelDay]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const DB=window.RECIPES_DB||[];

  const gen=(days)=>{
    const np={...plan};
    const daysArr=days===1?[selDay]:Array.from({length:7},(_,i)=>i);
    daysArr.forEach(di=>{
      PLAN_MEALS.forEach(meal=>{
        const cats={Сніданок:"Сніданок",Суп:"Суп",Вечеря:"Вечеря"};
        const pool=DB.filter(r=>r.cat===cats[meal]);
        if(!pool.length)return;
        const r=pool[Math.floor(Math.random()*pool.length)];
        np[`${di}-${meal}`]=[r];
        (r.ing||[]).forEach(ing=>setShop(p=>[...p,{id:Date.now()+Math.random(),name:`${ing.a} ${ing.n}`.trim(),from:r.name,bought:false,day:di}]));
      });
    });
    setPlan(np);
  };

  const rem=(d,m)=>{setPlan(p=>({...p,[`${d}-${m}`]:[]}))} ;
  const dayKcal=PLAN_MEALS.flatMap(m=>(plan[`${selDay}-${m}`]||[])).reduce((s,r)=>s+r.kcal,0);

  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:26}}>📅 Раціон</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>gen(1)} style={{padding:"7px 12px",background:C2,border:"none",color:SO,borderRadius:10,fontSize:12,cursor:"pointer"}}>День</button>
          <button onClick={()=>gen(7)} style={{padding:"7px 14px",background:A,border:"none",color:"#fff",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer"}}>Тиждень</button>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,background:C,borderRadius:12,padding:"10px 16px",marginBottom:14}}>
        <span style={{fontSize:13,color:MU}}>Порцій:</span>
        <button onClick={()=>setSrv(s=>Math.max(1,s-1))} style={{background:C2,border:"none",color:TX,borderRadius:"50%",width:28,height:28,fontSize:18,cursor:"pointer"}}>−</button>
        <span style={{fontWeight:800,fontSize:18,minWidth:22,textAlign:"center"}}>{srv}</span>
        <button onClick={()=>setSrv(s=>s+1)} style={{background:C2,border:"none",color:TX,borderRadius:"50%",width:28,height:28,fontSize:18,cursor:"pointer"}}>+</button>
        {dayKcal>0&&<span style={{marginLeft:"auto",fontSize:13,color:A,fontWeight:700}}>~{dayKcal} ккал</span>}
      </div>

      <div style={{display:"flex",overflowX:"auto",marginBottom:14,gap:2}}>
        {weekDates.map((d,i)=>(
          <div key={i} onClick={()=>setSelDay(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:46,cursor:"pointer"}}>
            <div style={{fontSize:10,color:d.isToday?A:selDay===i?TX:MU,marginBottom:4,fontWeight:600}}>{DAYS_SHORT[i]}</div>
            <div style={{width:36,height:36,borderRadius:"50%",background:selDay===i?A:d.isToday?"rgba(232,83,10,.2)":"transparent",border:d.isToday&&selDay!==i?`2px solid ${A}`:"none",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:selDay===i?"#fff":d.isToday?A:MU}}>{d.date}</div>
            <div style={{width:6,height:6,borderRadius:"50%",background:PLAN_MEALS.some(m=>plan[`${i}-${m}`]?.length)?A:"transparent",marginTop:4}}/>
          </div>
        ))}
      </div>

      {PLAN_MEALS.map(meal=>{
        const k=`${selDay}-${meal}`;
        const items=plan[k]||[];
        return(
          <div key={meal} style={{background:C,borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:items.length?12:0}}>
              <div style={{fontWeight:700,fontSize:16}}>{MEAL_ICONS[meal]} {meal}</div>
              {items.length>0&&<button onClick={()=>rem(selDay,meal)} style={{background:C2,border:"none",color:MU,borderRadius:20,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>×</button>}
            </div>
            {items.map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderTop:`1px solid ${BR}`}}>
                <div style={{fontSize:28,flexShrink:0}}>{r.e||"🍽️"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,lineHeight:1.3}}>{r.name}</div>
                  <div style={{fontSize:12,color:MU}}>⏱ {r.time} хв · 🔥 {r.kcal} ккал</div>
                </div>
                <button onClick={()=>rem(selDay,meal)} style={{background:"none",border:"none",color:MU,cursor:"pointer",fontSize:22}}>×</button>

const CaloriesPage=({apiKey,plan})=>{
  const[diary,setDiary]=useLS("khawk_diary5",[]);

  const today=new Date().toDateString();
  const todayDiary=diary.filter(e=>e.date===today);
  const tot=todayDiary.reduce((a,x)=>({kcal:a.kcal+(+x.kcal||0),p:a.p+(+x.p||0),f:a.f+(+x.f||0),c:a.c+(+x.c||0)}),{kcal:0,p:0,f:0,c:0});
  const pct=Math.min(tot.kcal/goal,1);
  const circ=2*Math.PI*54;

  // СТАТИСТИКА
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();
    d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    return diary.filter(e=>e.date===ds).reduce((s,e)=>s+(+e.kcal||0),0);

  const avgKcal=Math.round(last7.reduce((a,b)=>a+b,0)/7);

    if(!aiQ.trim())return;
    if(!apiKey){alert("Потрібен API ключ");return;}
    setAiLoad(true);setAiRes(null);
    try{
      const raw=await claude(apiKey,[{role:"user",content:`Порахуй калорії: "${aiQ}". JSON: {"name":"назва","e":"emoji","kcal":число,"p":число,"f":число,"c":число,"note":"порада"}`}],"Нутриціолог. JSON.",400);
      setAiRes(JSON.parse(raw.replace(/```json|```/g,"").trim()));

    setAiLoad(false);

  const addE=e=>{setDiary(p=>[...p,{...e,id:Date.now(),date:today,time:new Date().toLocaleTimeString("uk-UA",{hour:"2-digit",minute:"2-digit"})}]);speak("Додано до щоденника");};

        ))}
      </div>

      {tab==="today"&&<>
        <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>

              <circle cx="65" cy="65" r="54" fill="none" stroke={BR} strokeWidth={9}/>
              <circle cx="65" cy="65" r="54" fill="none" stroke={pct>0.95?A:G} strokeWidth={9} strokeDasharray={circ} strokeDashoffset={circ-pct*circ} strokeLinecap="round" style={{transition:"all .8s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>

          <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>📅 План на тиждень</div>
          <div style={{fontSize:13,color:MU,marginBottom:4}}>Загалом: <span style={{color:A,fontWeight:700}}>{planKcal}</span> ккал</div>
          <div style={{fontSize:13,color:MU}}>Середня на день: <span style={{color:A,fontWeight:700}}>{Math.round(planKcal/7)}</span> ккал</div>
        </div>
      </>}
    </div>
  );
};

// ── PREFERENCES PAGE ──

  const[newAllergy,setNewAllergy]=useState("");
  const{speak}=useVoice();

  const allOpts=[
    {cat:"allergies",label:"🚫 Алергії",icon:"⚠️",color:"#ff4444"},
    {cat:"dislike",label:"😖 Не люблю",icon:"😒",color:"#ff9800"},
    {cat:"cuisine",label:"🌍 Кухні",icon:"🍴",color:"#2196F3"},
    {cat:"dietary",label:"🥗 Дієта",icon:"🥦",color:"#4CAF50"}
  ];

  const items=[
    {v:"gluten",l:"🌾 Глютен"},
    {v:"dairy",l:"🥛 Молочне"},
    {v:"nuts",l:"🥜 Горішки"},
    {v:"seafood",l:"🦞 Морепродукти"},
    {v:"shellfish",l:"🦪 Молюски"},
    {v:"eggs",l:"🥚 Яйця"},
    {v:"soy",l:"🫘 Соя"},
    {v:"spicy",l:"����️ Гострі"},
    {v:"meat",l:"🥩 М'ясо"},
    {v:"fish",l:"🐟 Риба"},
    {v:"beetroot",l:"🫓 Буряк"},
    {v:"mushrooms",l:"🍄 Гриби"},
    {v:"tomato",l:"🍅 Помідори"},
  ];

  return(

      {allOpts.map(opt=>(
        <div key={opt.cat} style={{background:C,borderRadius:14,padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:12,display:"flex",gap:8}}><span style={{fontSize:20}}>{opt.icon}</span>{opt.label}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {prefs[opt.cat]?.map(p=>(
              <div key={p} style={{background:opt.color+"40",border:`1px solid ${opt.color}`,borderRadius:20,padding:"6px 12px",fontSize:13,color:opt.color,display:"flex",alignItems:"center",gap:8}}>
                {items.find(x=>x.v===p)?.l||p}
                <button onClick={()=>setPrefs(pp=>({...pp,[opt.cat]:pp[opt.cat].filter(x=>x!==p)}))} style={{background:"none",border:"none",color:opt.color,cursor:"pointer",fontSize:16}}>×</button>

          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

// ── SETTINGS PAGE ──

  const[ok,setOk]=useState(false);

        <div style={{fontSize:13,color:MU,marginBottom:12,lineHeight:1.6}}>Для AI. Зберігається локально.</div>
        <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-api03-..." style={{background:C2,border:`1px solid ${BR}`,borderRadius:10,padding:"11px 14px",fontSize:13,color:TX,outline:"none",width:"100%",fontFamily:"monospace",marginBottom:12}}/>
        <button onClick={()=>{setApiKey(k);setOk(true);setTimeout(()=>setOk(false),2000);}} style={{width:"100%",padding:12,background:ok?"#2d7a1f":"#e8530a",border:"none",color:"#fff",borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer"}}>{ok?"✓ Збережено!":"Зберегти"}</button>

// ── APP ──
const App=()=>{
  const[tab,setTab]=useState("recipes");
  const[apiKey,setApiKey]=useLS("khawk_key6","");
  const[faves,setFaves]=useLS("khawk_faves6",[]);
  const[plan,setPlan]=useLS("khawk_plan6",{});
  const[shop,setShop]=useLS("khawk_shop6",[]);
  const[srv,setSrv]=useLS("khawk_srv6",4);
  const[myRecs,setMyRecs]=useLS("khawk_mine6",[]);
  const[hidden,setHidden]=useLS("khawk_hidden6",[]);
  const[detail,setDetail]=useState(null);
  const[addTo,setAddTo]=useState(null);
  const{speak}=useVoice();

  const toggleFav=id=>{setFaves(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);speak("Додано в вподобання");};

  const confirmPlan=(r,meal)=>{
    const k=`0-${meal}`;
    setPlan(p=>({...p,[k]:[...(p[k]||[]),r]}));
    const dayOffset=new Date().getDay()===0?6:new Date().getDay()-1;
    (r.ing||[]).forEach(i=>setShop(p=>[...p,{id:Date.now()+Math.random(),name:`${i.a} ${i.n}`.trim(),from:r.name,bought:false,day:dayOffset}]));
    setAddTo(null);
  };

  const TABS=[{id:"recipes",icon:"📖",label:"Рецепти"},{id:"plan",icon:"📅",label:"Раціон"},{id:"calories",icon:"📊",label:"Калорії"},{id:"shop",icon:"🛒",label:"Покупки"},{id:"prefs",icon:"❤️",label:"Смаки"},{id:"settings",icon:"⚙️",label:"Налашт."}];

  return(
    <div style={{background:BG,minHeight:"100dvh",color:TX,display:"flex",flexDirection:"column"}}>
      {detail&&<RDetail r={detail} srv={srv} setSrv={setSrv} onBack={()=>setDetail(null)} onPlan={r=>{setAddTo(r);setDetail(null);}} onHide={()=>setHidden(p=>[...p,detail.id])}/>}

      {addTo&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:90,display:"flex",alignItems:"flex-end",maxWidth:430,margin:"0 auto"}}>
          <div style={{background:C,borderRadius:"24px 24px 0 0",padding:"24px 20px 36px",width:"100%"}}>
            <div style={{fontWeight:700,fontSize:17,marginBottom:4,lineHeight:1.3}}>{addTo.name}</div>
            <div style={{color:MU,fontSize:13,marginBottom:18}}>Вибери прийом:</div>
            {PLAN_MEALS.map(m=>(
              <button key={m} onClick={()=>confirmPlan(addTo,m)} style={{display:"flex",alignItems:"center",gap:14,width:"100%",background:C2,border:"none",color:TX,borderRadius:14,padding:"14px 18px",fontSize:15,cursor:"pointer",marginBottom:8,fontWeight:500}}>
                <span style={{fontSize:24}}>{MEAL_ICONS[m]}</span>{m}
              </button>
            ))}
            <button onClick={()=>setAddTo(null)} style={{width:"100%",background:"transparent",border:`1px solid ${BR}`,color:MU,borderRadius:14,padding:13,fontSize:14,cursor:"pointer",marginTop:4}}>Скасувати</button>
          </div>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
        {tab==="recipes"&&<RecipesPage faves={faves} onFav={toggleFav} onAdd={r=>setAddTo(r)} onOpen={r=>setDetail(r)} myRecs={myRecs} setMyRecs={setMyRecs} apiKey={apiKey} hidden={hidden} setHidden={setHidden}/>}
        {tab==="plan"&&<PlanPage plan={plan} setPlan={setPlan} shop={shop} setShop={setShop} srv={srv} setSrv={setSrv}/>}
        {tab==="calories"&&<CaloriesPage apiKey={apiKey} plan={plan}/>}
        {tab==="shop"&&<ShopPage shop={shop} setShop={setShop}/>}
        {tab==="prefs"&&<PreferencesPage apiKey={apiKey} setApiKey={setApiKey}/>}
        {tab==="settings"&&<SettingsPage apiKey={apiKey} setApiKey={setApiKey}/>}
      </div>

      <div style={{background:"#111",display:"flex",position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,borderTop:`1px solid ${BR}`,zIndex:50}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 2px 8px",border:"none",background:"transparent",color:tab===t.id?A:MU,cursor:"pointer",fontSize:9,fontWeight:tab===t.id?700:400,borderTop:tab===t.id?`2px solid ${A}`:"2px solid transparent"}}>
            <span style={{fontSize:19}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
