<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KitchenHawk">
<meta name="theme-color" content="#1a1a1a">
<title>🍽️ KitchenHawk AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#f0f0f0;overscroll-behavior:none;width:100%;height:100%;-webkit-user-select:none;-webkit-touch-callout:none}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#root{width:100%;max-width:100vw;min-height:100vh;margin:0;padding:0}
::-webkit-scrollbar{width:0;height:0}
input,select,textarea,button{font-family:inherit;font-size:16px;-webkit-appearance:none;border-radius:8px}
input,textarea{padding:12px;background:#242424;border:1px solid #333;color:#f0f0f0}
input:focus,textarea:focus{outline:none;border-color:#e8530a}
button{cursor:pointer;padding:12px 16px;border:none}
textarea{resize:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fade{animation:fadeUp .25s ease}
.spin{animation:spin 1s linear infinite}
.container{width:100%;padding:0;margin:0;display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="root"></div>

<script src="recipes.js"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const A="#e8530a",G="#2d7a1f",BG="#1a1a1a",C="#242424",C2="#2e2e2e",BR="#333",MU="#666",SO="#999",TX="#f0f0f0";

// ── LOCAL STORAGE ──
const useLS=(key,def)=>{
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}});
  const set=useCallback(fn=>{sv(p=>{const n=typeof fn==="function"?fn(p):fn;try{localStorage.setItem(key,JSON.stringify(n));}catch{}return n;});},[key]);
  return[v,set];
};

// ── CLAUDE API ──
const claude=async(key,msgs,sys="",max=1000)=>{
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,system:sys,messages:msgs})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content.map(b=>b.text||"").join("");
  }catch(e){
    console.error("Claude error:",e);
    throw e;
  }
};

// ── VOICE SYNTHESIS ──
const useVoice=()=>{
  const syn=window.speechSynthesis;
  return {
    speak:(text,lang="uk-UA")=>{
      if(!text)return;
      const u=new SpeechSynthesisUtterance(text);
      u.lang=lang;
      u.rate=0.9;
      u.pitch=1;
      syn.cancel();
      syn.speak(u);
    },
    stop:()=>syn.cancel(),
    isSupported:!!syn
  };
};

// ── SPEECH RECOGNITION ──
const useSpeechRecognition=()=>{
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  const[listening,setListening]=useState(false);
  const recRef=useRef(null);
  
  const start=useCallback((onResult)=>{
    if(!SpeechRecognition)return;
    const rec=new SpeechRecognition();
    rec.lang="uk-UA";
    rec.continuous=false;
    rec.interimResults=false;
    
    rec.onstart=()=>setListening(true);
    rec.onresult=e=>{
      const t=[...e.results].map(r=>r[0].transcript).join("");
      onResult?.(t);
    };
    rec.onend=()=>setListening(false);
    rec.onerror=e=>console.error("Speech error:",e);
    
    recRef.current=rec;
    rec.start();
  },[]);

  return{listening,start,stop:()=>recRef.current?.abort(),isSupported:!!SpeechRecognition};
};

// ── GET WEEK DATES ──
const getWeekDates=()=>{
  const today=new Date();
  const dow=today.getDay()||7;
  const monday=new Date(today);
  monday.setDate(today.getDate()-(dow-1));
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return{date:d.getDate(),month:d.getMonth()+1,isToday:d.toDateString()===today.toDateString(),day:["Пн","Вт","Ср","Чт","Пт","Сб","Нд"][i]};
  });
};

const CATS=["Сніданок","Суп","Обід","Вечеря","Десерт","Перекус"];
const PLAN_MEALS=["Сніданок","Вечеря"];
const MEAL_ICONS={Сніданок:"☀️",Суп:"🍲",Вечеря:"🌙",Обід:"🍽️"};

// ── RECIPE CARD ──
const RCard=({r,onOpen})=>(
  <div className="fade" onClick={onOpen} style={{background:C,borderRadius:12,overflow:"hidden",marginBottom:10,cursor:"pointer",padding:12,display:"flex",gap:12}}>
    <div style={{fontSize:36,flexShrink:0}}>{r.e||"🍽️"}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{r.name}</div>
      <div style={{display:"flex",gap:8,fontSize:12,color:MU}}>
        <span>⏱ {r.time}m</span>
        <span>🔥 {r.kcal}</span>
      </div>
    </div>
  </div>
);

// ── RECIPE DETAIL ──
const RDetail=({r,onBack})=>{
  const[step,setStep]=useState(0);
  const{speak}=useVoice();
  
  return(
    <div style={{position:"fixed",inset:0,background:BG,zIndex:100,overflowY:"auto",paddingTop:40,paddingBottom:20}}>
      <button onClick={onBack} style={{position:"fixed",top:10,left:10,zIndex:101,background:A,color:"#fff",border:"none",borderRadius:"50%",width:36,height:36,fontSize:18,cursor:"pointer"}}>←</button>
      
      <div style={{padding:"20px",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:10}}>{r.e}</div>
        <div style={{fontWeight:800,fontSize:18,marginBottom:8}}>{r.name}</div>
        <div style={{fontSize:13,color:MU}}>⏱ {r.time} хв • 🔥 {r.kcal} ккал</div>
      </div>

      <div style={{padding:"0 20px"}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10,marginTop:20}}>Інгредієнти:</div>
        {(r.ing||[]).map((ing,i)=>(
          <div key={i} style={{fontSize:13,padding:"8px 0",borderBottom:`1px solid ${BR}`}}>
            {ing.n} - <span style={{color:A}}>{ing.a}</span>
          </div>
        ))}

        <div style={{fontWeight:700,fontSize:14,marginBottom:10,marginTop:20}}>Кроки приготування:</div>
        {(r.steps||[]).map((s,i)=>(
          <div key={i} onClick={()=>setStep(step===i?-1:i)} style={{background:step===i?C:C2,padding:10,marginBottom:8,borderRadius:8,cursor:"pointer",fontSize:13,lineHeight:1.6}}>
            <span style={{fontWeight:700,color:A}}>{i+1}.</span> {s}
          </div>
        ))}
      </div>
    </div>
  );
};

// ── AI CHAT PAGE ──
const ChatPage=({apiKey})=>{
  const[msgs,setMsgs]=useState([{r:"ai",t:"Привіт! 👨‍🍳\n\nЯ твій AI шеф. Можу:\n📖 Пропонувати рецепти\n🗣️ Слухати голос\n📅 Планувати меню\n💾 Запам'ятовувати смаки"}]);
  const[inp,setInp]=useState("");
  const[load,setLoad]=useState(false);
  const{speak}=useVoice();
  const{listening,start:startListen}=useSpeechRecognition();
  const bot=useRef();
  const DB=window.RECIPES_DB||[];

  useEffect(()=>bot.current?.scrollIntoView(),[msgs]);

  if(!apiKey)return(
    <div style={{padding:20,textAlign:"center",marginTop:60}}>
      <div style={{fontSize:48,marginBottom:20}}>🔑</div>
      <div style={{fontWeight:700,fontSize:16,marginBottom:10}}>Потрібен Claude API</div>
      <div style={{fontSize:13,color:MU}}>Перейди в ⚙️ → Додай ключ</div>
    </div>
  );

  const send=async(text="")=>{
    const t=text||inp;
    if(!t.trim()||load)return;
    setInp("");
    setMsgs(p=>[...p,{r:"u",t}]);
    setLoad(true);

    try{
      const sys=`Ти AI шеф-кухар. У базі ${DB.length} рецептів. Порадь рецепти з бази!`;
      const msgs_=[...msgs.map(m=>({role:m.r==="u"?"user":"assistant",content:m.t})),{role:"user",content:t}];
      const reply=await claude(apiKey,msgs_,sys,800);
      setMsgs(p=>[...p,{r:"ai",t:reply}]);
      speak(reply.substring(0,150));
    }catch(e){
      setMsgs(p=>[...p,{r:"ai",t:"❌ "+e.message}]);
    }
    setLoad(false);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:BG}}>
      <div style={{flex:1,overflowY:"auto",padding:"10px 16px"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start",marginBottom:12,gap:8}}>
            {m.r==="ai"&&<div style={{fontSize:28,flexShrink:0}}>👨‍🍳</div>}
            <div style={{maxWidth:"85%",background:m.r==="u"?A:C,padding:12,borderRadius:12,fontSize:13,lineHeight:1.6,color:"#fff"}}>
              {m.t}
            </div>
            {m.r==="u"&&<div style={{fontSize:28,flexShrink:0}}>👤</div>}
          </div>
        ))}
        {load&&<div style={{textAlign:"center",color:MU,fontSize:12}}>⏳ Думаю...</div>}
        <div ref={bot}/>
      </div>

      <div style={{padding:"10px 16px 20px",background:"#111",borderTop:`1px solid ${BR}`}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input 
            value={inp} 
            onChange={e=>setInp(e.target.value)} 
            onKeyDown={e=>e.key==="Enter"&&send()} 
            placeholder="Напиши..." 
            style={{flex:1,fontSize:14,padding:10}}
          />
          <button onClick={()=>startListen(t=>send(t))} style={{background:listening?A:"#333",color:listening?"#fff":MU,width:44,height:44,borderRadius:"50%",fontSize:18,border:"none",cursor:"pointer"}}>🎤</button>
          <button onClick={()=>send()} style={{background:A,color:"#fff",width:44,height:44,borderRadius:"50%",fontSize:18,border:"none",cursor:"pointer"}}>➤</button>
        </div>
      </div>
    </div>
  );
};

// ── RECIPES PAGE ──
const RecipesPage=({onOpen})=>{
  const[search,setSearch]=useState("");
  const DB=window.RECIPES_DB||[];
  
  const filtered=useMemo(()=>{
    if(!search)return DB;
    const q=search.toLowerCase();
    return DB.filter(r=>r.name.toLowerCase().includes(q));
  },[search,DB]);

  return(
    <div style={{padding:"12px 16px"}}>
      <div style={{fontWeight:800,fontSize:20,marginBottom:12}}>📖 Рецепти ({DB.length})</div>
      <input 
        value={search} 
        onChange={e=>setSearch(e.target.value)} 
        placeholder="Пошук..." 
        style={{width:"100%",marginBottom:12,fontSize:14,padding:10}}
      />
      <div style={{fontSize:12,color:MU,marginBottom:12}}>Знайдено: {filtered.length}</div>
      {filtered.slice(0,50).map(r=><RCard key={r.id} r={r} onOpen={()=>onOpen(r)}/>)}
      {filtered.length>50&&<div style={{textAlign:"center",color:MU,fontSize:12}}>+ ще {filtered.length-50}</div>}
    </div>
  );
};

// ── PLAN PAGE ──
const PlanPage=({plan,setPlan})=>{
  const[selDay,setSelDay]=useState(0);
  const weekDates=useMemo(()=>getWeekDates(),[]);
  const DB=window.RECIPES_DB||[];

  const genMenu=()=>{
    const np={...plan};
    for(let i=0;i<7;i++){
      PLAN_MEALS.forEach(meal=>{
        const pool=DB.filter(r=>r.cat===meal);
        if(pool.length){
          const r=pool[Math.floor(Math.random()*pool.length)];
          np[`${i}-${meal}`]=[r];
        }
      });
    }
    setPlan(np);
  };

  return(
    <div style={{padding:"12px 16px"}}>
      <div style={{fontWeight:800,fontSize:20,marginBottom:12}}>📅 Меню</div>
      <button onClick={genMenu} style={{width:"100%",background:A,color:"#fff",border:"none",padding:12,borderRadius:8,fontWeight:700,marginBottom:12,cursor:"pointer"}}>✨ Генерувати тиждень</button>

      <div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:14}}>
        {weekDates.map((d,i)=>(
          <button key={i} onClick={()=>setSelDay(i)} style={{flex:1,minWidth:50,background:selDay===i?A:C,border:"none",color:selDay===i?"#fff":TX,borderRadius:8,padding:10,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
            <div style={{fontWeight:700}}>{d.day}</div>
            <div>{d.date}.{d.month}</div>
          </button>
        ))}
      </div>

      {PLAN_MEALS.map(meal=>{
        const k=`${selDay}-${meal}`;
        const r=plan[k]?.[0];
        return(
          <div key={meal} style={{background:C,padding:12,marginBottom:10,borderRadius:8}}>
            <div style={{fontWeight:700,marginBottom:8}}>{MEAL_ICONS[meal]} {meal}</div>
            {r?<div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{r.e} {r.name}</div>
              <div style={{fontSize:12,color:MU}}>⏱ {r.time} хв • 🔥 {r.kcal} ккал</div>
              <button onClick={()=>setPlan(p=>({...p,[k]:[]}))} style={{marginTop:8,width:"100%",background:"#ff4444",color:"#fff",border:"none",padding:8,borderRadius:6,fontSize:12,cursor:"pointer"}}>✕ Видалити</button>
            </div>:<div style={{color:MU,fontSize:12}}>Пусто</div>}
          </div>
        );
      })}
    </div>
  );
};

// ── SETTINGS ──
const SettingsPage=({apiKey,setApiKey})=>{
  const[k,setK]=useState(apiKey);

  return(
    <div style={{padding:"12px 16px"}}>
      <div style={{fontWeight:800,fontSize:20,marginBottom:20}}>⚙️ Налаштування</div>
      <div style={{background:C,padding:16,borderRadius:8}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>🔑 Claude API</div>
        <div style={{fontSize:12,color:MU,marginBottom:10}}>Без цього AI не працює</div>
        <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",marginBottom:10}}/>
        <button onClick={()=>{setApiKey(k);alert("✓ Збережено");}} style={{width:"100%",background:A,color:"#fff",border:"none",padding:12,borderRadius:8,fontWeight:700,cursor:"pointer"}}>Зберегти</button>
      </div>
    </div>
  );
};

// ── MAIN APP ──
const App=()=>{
  const[tab,setTab]=useState("chat");
  const[apiKey,setApiKey]=useLS("khawk_key8","");
  const[plan,setPlan]=useLS("khawk_plan8",{});
  const[detail,setDetail]=useState(null);
  const DB=window.RECIPES_DB||[];

  return(
    <div style={{background:BG,minHeight:"100vh",color:TX}}>
      {detail&&<RDetail r={detail} onBack={()=>setDetail(null)}/>}

      <div style={{paddingBottom:60}}>
        {tab==="chat"&&<ChatPage apiKey={apiKey}/>}
        {tab==="recipes"&&<RecipesPage onOpen={r=>setDetail(r)}/>}
        {tab==="plan"&&<PlanPage plan={plan} setPlan={setPlan}/>}
        {tab==="settings"&&<SettingsPage apiKey={apiKey} setApiKey={setApiKey}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#111",borderTop:`1px solid ${BR}`,display:"flex",zIndex:50,height:60}}>
        {[{id:"chat",icon:"👨‍🍳",l:"Шеф"},{id:"recipes",icon:"📖",l:"Рецепти"},{id:"plan",icon:"📅",l:"Меню"},{id:"settings",icon:"⚙️",l:"Налашт."}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",color:tab===t.id?A:MU,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",fontSize:10,fontWeight:tab===t.id?700:400}}>
            <span style={{fontSize:18}}>{t.icon}</span>{t.l}
          </button>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
