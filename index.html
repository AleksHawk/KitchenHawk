<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>KitchenHawk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#1a1a1a;font-family:-apple-system,sans-serif;color:#f0f0f0;overscroll-behavior:none}
#root{max-width:430px;margin:0 auto;min-height:100dvh}
::-webkit-scrollbar{width:0;height:0}
input,select,textarea,button{font-family:inherit}
.fade{animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>

<script src="recipes.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const A="#e8530a",G="#2d7a1f",BG="#1a1a1a",C="#242424",C2="#2e2e2e",BR="#333",MU="#666",SO="#999",TX="#f0f0f0";

const useLS=(key,def)=>{
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}});
  const set=useCallback(fn=>{sv(p=>{const n=typeof fn==="function"?fn(p):fn;try{localStorage.setItem(key,JSON.stringify(n));}catch{}return n;});},[key]);
  return[v,set];
};

const claude=async(key,msgs,sys="",max=800)=>{
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-3-5-sonnet-20241022",max_tokens:max,system:sys,messages:msgs})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("");
};

const CATS=["Всі","Сніданок","Суп","Обід","Вечеря","Десерт","Перекус"];
const MEAL_ICONS={Сніданок:"☀️",Суп:"🍲",Вечеря:"🌙"};
const PLAN_MEALS=Object.keys(MEAL_ICONS);

const RCard=({r,onOpen,onAdd,onFav,faved,onHide})=>(
  <div className="fade" style={{background:C,borderRadius:16,overflow:"hidden",marginBottom:12,cursor:"pointer"}} onClick={onOpen}>
    <div style={{background:"linear-gradient(135deg,#2a1a0a,#1a1a2a)",padding:"14px 14px 10px",display:"flex",gap:12}}>
      <div style={{fontSize:42}}>{r.e||"🍽️"}</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{r.name}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <span style={{background:"rgba(255,255,255,.1)",borderRadius:20,padding:"2px 9px",fontSize:11}}>⏱ {r.time} хв</span>
          <span style={{background:"rgba(255,255,255,.1)",borderRadius:20,padding:"2px 9px",fontSize:11}}>🔥 {r.kcal} ккал</span>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <button onClick={e=>{e.stopPropagation();onFav();}} style={{background:"rgba(0,0,0,.4)",border:"none",color:faved?"#ff6b6b":TX,borderRadius:"50%",width:32,height:32,cursor:"pointer"}}>♥</button>
        <button onClick={e=>{e.stopPropagation();onHide();}} style={{background:"rgba(0,0,0,.4)",border:"none",color:TX,borderRadius:"50%",width:32,height:32,cursor:"pointer"}}>👁</button>
      </div>
    </div>
  </div>
);

const RDetail=({r,srv,setSrv,onBack,onPlan,apiKey,prefs})=>{
  const askRep=async(ing)=>{
    if(!apiKey)return alert("потрібен api ключ");
    try{
      const res=await claude(apiKey,[{role:"user",content:`чим замінити ${ing} у страві ${r.name}?`}],prefs?`вподобання користувача: ${prefs}`:"",200);
      alert(res);
    }catch(e){alert("помилка")}
  };
  return(
    <div style={{position:"fixed",inset:0,background:BG,zIndex:100,overflowY:"auto",maxWidth:430,margin:"0 auto"}}>
      <div style={{padding:"60px 20px 20px",background:"linear-gradient(135deg,#2a1a0a,#1a1a2a)"}}>
        <button onClick={onBack} style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,.5)",border:"none",color:"#fff",borderRadius:"50%",width:42,height:42,fontSize:20}}>←</button>
        <div style={{fontSize:64}}>{r.e||"🍽️"}</div>
        <div style={{fontWeight:800,fontSize:24}}>{r.name}</div>
      </div>
      <div style={{padding:"20px"}}>
        <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>інгредієнти</div>
        <div style={{background:C,borderRadius:14,marginBottom:20}}>
          {(r.ing||[]).map((ing,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",padding:"11px 16px",borderBottom:`1px solid ${BR}`}}>
              <div style={{flex:1}}>{ing.n} - <span style={{color:A}}>{ing.a}</span></div>
              <button onClick={()=>askRep(ing.n)} style={{background:C2,border:"none",color:MU,padding:"4px 8px",borderRadius:8,fontSize:12}}>🔄 заміна</button>
            </div>
          ))}
        </div>
        <div style={{fontWeight:700,fontSize:17,marginBottom:12}}>кроки</div>
        {(r.steps||[]).map((s,i)=><div key={i} style={{marginBottom:10,fontSize:13,lineHeight:1.6,padding:"10px",background:C,borderRadius:12}}><strong style={{color:A}}>{i+1}.</strong> {s}</div>)}
        <button onClick={()=>onPlan(r)} style={{width:"100%",padding:14,background:A,border:"none",color:"#fff",borderRadius:12,fontWeight:700,marginTop:10}}>+ в раціон</button>
      </div>
    </div>
  );
};

const RecipesPage=({faves,onFav,onOpen,myRecs,setMyRecs,apiKey,hidden,setHidden})=>{
  const[cat,setCat]=useState("Всі");
  const DB=window.RECIPES_DB||[];
  const all=useMemo(()=>[...DB,...myRecs].filter(r=>!hidden.includes(r.id)),[myRecs,hidden]);
  const fil=cat==="Всі"?all:all.filter(x=>x.cat===cat);
  
  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontWeight:800,fontSize:26,marginBottom:12}}>рецепти</div>
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12}}>
        {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?A:C,border:"none",color:cat===c?"#fff":MU,borderRadius:20,padding:"7px 14px",fontSize:12}}>{c}</button>)}
      </div>
      {fil.map(r=><RCard key={r.id} r={r} onOpen={()=>onOpen(r)} onFav={()=>onFav(r.id)} faved={faves.includes(r.id)} onHide={()=>setHidden(p=>[...p,r.id])}/>)}
    </div>
  );
};

const PlanPage=({plan,setPlan,shop,setShop})=>{
  const days=["пн","вт","ср","чт","пт","сб","нд"];
  const[day,setDay]=useState(0);
  const dayKcal=PLAN_MEALS.flatMap(m=>plan[`${day}-${m}`]||[]).reduce((s,r)=>s+r.kcal,0);
  
  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:26}}>раціон</div>
        {dayKcal>0&&<div style={{color:A,fontWeight:700}}>~{dayKcal} ккал</div>}
      </div>
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        {days.map((d,i)=><button key={i} onClick={()=>setDay(i)} style={{flex:1,background:day===i?A:C,border:"none",color:day===i?"#fff":MU,padding:"8px",borderRadius:10}}>{d}</button>)}
      </div>
      {PLAN_MEALS.map(meal=>{
        const items=plan[`${day}-${meal}`]||[];
        return(
          <div key={meal} style={{background:C,borderRadius:16,padding:16,marginBottom:10}}>
            <div style={{fontWeight:700,marginBottom:10}}>{MEAL_ICONS[meal]} {meal}</div>
            {items.map((r,i)=><div key={i} style={{fontSize:14,borderTop:`1px solid ${BR}`,paddingTop:8}}>{r.name}</div>)}
            {!items.length&&<div style={{fontSize:12,color:MU}}>порожньо</div>}
          </div>
        );
      })}
    </div>
  );
};

const CaloriesPage=({apiKey,goal})=>{
  const[diary,setDiary]=useLS("kh_d",[]);
  const[load,setLoad]=useState(false);
  const tot=diary.reduce((s,x)=>s+(+x.kcal||0),0);

  const scan=async(e)=>{
    const file=e.target.files[0];
    if(!file||!apiKey)return;
    setLoad(true);
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        const b64=ev.target.result.split(",")[1];
        const res=await claude(apiKey,[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"оціни страву. тільки json: {\"name\":\"назва\",\"kcal\":число,\"e\":\"emoji\"}"}]}],"тільки json",300);
        const d=JSON.parse(res.replace(/```json|```/g,"").trim());
        setDiary(p=>[...p,{...d,id:Date.now()}]);
      }catch(err){alert("помилка сканування");}
      setLoad(false);
    };
    reader.readAsDataURL(file);
  };

  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontWeight:800,fontSize:26,marginBottom:14}}>калорії</div>
      <div style={{textAlign:"center",fontSize:32,fontWeight:900,color:tot>goal?A:G,marginBottom:20}}>{tot} / {goal}</div>
      <div style={{background:C,borderRadius:14,padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:10}}>📷 сканер по фото</div>
        <label style={{display:"block",padding:"12px",background:A,textAlign:"center",borderRadius:10,color:"#fff",fontWeight:700}}>{load?"⏳ сканую...":"завантажити фото"}
          <input type="file" accept="image/*" onChange={scan} style={{display:"none"}} disabled={load}/>
        </label>
      </div>
      {diary.map(e=><div key={e.id} style={{background:C,padding:"10px",borderRadius:10,marginBottom:8}}>{e.e} {e.name} - <strong style={{color:A}}>{e.kcal} ккал</strong></div>)}
    </div>
  );
};

const ChatPage=({apiKey,prefs})=>{
  const[hist,setHist]=useState([{r:"ai",t:"що підказати?"}]);
  const[inp,setInp]=useState("");
  
  const mic=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return alert("немає підтримки");
    const r=new SR();
    r.lang="uk-UA";
    r.onresult=e=>setInp(e.results[0][0].transcript);
    r.start();
  };

  const send=async()=>{
    if(!inp||!apiKey)return;
    const msg=inp; setInp("");
    setHist(p=>[...p,{r:"u",t:msg},{r:"ai",t:"...",load:true}]);
    try{
      const res=await claude(apiKey,[{role:"user",content:msg}],`кухонний асистент. ${prefs?"вподобання: "+prefs:""}`,300);
      setHist(p=>[...p.slice(0,-1),{r:"ai",t:res}]);
    }catch(e){}
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100dvh - 62px)",padding:"14px 16px 0"}}>
      <div style={{flex:1,overflowY:"auto"}}>
        {hist.map((m,i)=><div key={i} style={{textAlign:m.r==="u"?"right":"left",marginBottom:10}}><span style={{background:m.r==="u"?A:C,padding:"8px 14px",borderRadius:14,display:"inline-block"}}>{m.t}</span></div>)}
      </div>
      <div style={{display:"flex",gap:8,paddingBottom:10}}>
        <button onClick={mic} style={{background:C,border:"none",color:TX,padding:"10px",borderRadius:10}}>🎤</button>
        <input value={inp} onChange={e=>setInp(e.target.value)} style={{flex:1,background:C,border:"none",color:TX,padding:"10px",borderRadius:10}}/>
        <button onClick={send} style={{background:A,border:"none",color:"#fff",padding:"10px 16px",borderRadius:10}}>➤</button>
      </div>
    </div>
  );
};

const SettingsPage=({apiKey,setApiKey,prefs,setPrefs,goal,setGoal})=>{
  const calc=(w,h,a,g)=>{setGoal(Math.round(10*w+6.25*h-5*a+(g==='m'?5:-161)));};
  return(
    <div style={{padding:"14px 16px 0"}}>
      <div style={{fontWeight:800,fontSize:26,marginBottom:20}}>налаштування</div>
      <div style={{background:C,borderRadius:16,padding:20,marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:10}}>api ключ</div>
        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{width:"100%",padding:10,background:C2,border:"none",color:TX,marginBottom:10}}/>
      </div>
      <div style={{background:C,borderRadius:16,padding:20,marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:10}}>мої вподобання (аі врахує це)</div>
        <textarea value={prefs} onChange={e=>setPrefs(e.target.value)} placeholder="люблю гостре, веган..." style={{width:"100%",padding:10,background:C2,border:"none",color:TX,minHeight:80}}/>
      </div>
      <div style={{background:C,borderRadius:16,padding:20,marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:10}}>норма калорій: {goal}</div>
        <button onClick={()=>calc(75,180,30,'m')} style={{background:A,color:"#fff",border:"none",padding:"10px",borderRadius:10,width:"100%"}}>розрахувати стандарт (м, 75кг)</button>
      </div>
    </div>
  );
};

const App=()=>{
  const[tab,setTab]=useState("recipes");
  const[key,setKey]=useLS("kh_key","");
  const[faves,setFaves]=useLS("kh_f",[]);
  const[plan,setPlan]=useLS("kh_p",{});
  const[hidden,setHidden]=useLS("kh_h",[]);
  const[prefs,setPrefs]=useLS("kh_pr","");
  const[goal,setGoal]=useLS("kh_g",2000);
  const[det,setDet]=useState(null);

  const TABS=[{id:"recipes",icon:"📖"},{id:"plan",icon:"📅"},{id:"calories",icon:"📊"},{id:"chat",icon:"💬"},{id:"settings",icon:"⚙️"}];

  return(
    <div style={{background:BG,minHeight:"100dvh",color:TX,display:"flex",flexDirection:"column"}}>
      {det&&<RDetail r={det} onBack={()=>setDet(null)} onPlan={r=>setDet(null)} apiKey={key} prefs={prefs}/>}
      <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
        {tab==="recipes"&&<RecipesPage faves={faves} onFav={id=>setFaves(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id])} onOpen={setDet} hidden={hidden} setHidden={setHidden} apiKey={key}/>}
        {tab==="plan"&&<PlanPage plan={plan} setPlan={setPlan}/>}
        {tab==="calories"&&<CaloriesPage apiKey={key} goal={goal}/>}
        {tab==="chat"&&<ChatPage apiKey={key} prefs={prefs}/>}
        {tab==="settings"&&<SettingsPage apiKey={key} setApiKey={setKey} prefs={prefs} setPrefs={setPrefs} goal={goal} setGoal={setGoal}/>}
      </div>
      <div style={{background:"#111",display:"flex",position:"fixed",bottom:0,width:"100%",maxWidth:430,borderTop:`1px solid ${BR}`}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"14px",border:"none",background:"transparent",color:tab===t.id?A:MU,fontSize:22}}>{t.icon}</button>)}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
